name: plantera
description: "Plantera – din digitala trädgårdskompis med planteringskalender, frostvarning och växtdatabas."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Local database
  sqflite: ^2.4.2
  path: ^1.9.1

  # Local notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Shared preferences (settings, zone, first-run)
  shared_preferences: ^2.3.4

  # Date utilities
  intl: ^0.20.2
  table_calendar: ^3.1.3

  # UUID generation
  uuid: ^4.5.1

  # Path provider (photo storage)
  path_provider: ^2.1.5

  # URL launcher (affiliate + support links)
  url_launcher: ^6.3.1

  # Ads (AdMob)
  google_mobile_ads: ^5.3.0

  # Share files (CSV/PDF export)
  share_plus: ^10.1.4

  # PDF generation (harvest/garden reports)
  pdf: ^3.11.0
  printing: ^5.13.4

  # In-App Purchases
  in_app_purchase: ^3.2.0
  in_app_purchase_storekit: ^0.3.0

  # Facebook Conversions API / App Events
  facebook_app_events: ^0.27.0

  # iOS App Tracking Transparency (ATT)
  app_tracking_transparency: ^2.0.6

  # Image picker (garden plant photos)
  image_picker: ^1.1.2

  # Cached network image (plant photos from URLs)
  cached_network_image: ^3.4.1

  # GPS location (for zone + weather lookup)
  geolocator: ^13.0.2

  # HTTP (for SMHI weather API)
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon/app_icon_1024.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#2D5016"
  adaptive_icon_foreground: "assets/app_icon/app_icon_1024.png"

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
